<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlantic Hurricane Tracks 1851–2025</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.31/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; }
    #viewDiv { width: 100%; height: 100%; transition: width 0.3s; }
    /* view.padding handles panel offset — no width change needed */

    /* Feature info panel */
    #infoPanel {
      position: absolute; top: 0; right: 0; width: 380px; height: 100%; z-index: 10;
      background: rgba(20, 20, 40, 0.97); backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto; display: block;
    }
    #infoPanel.open { display: block; }
    #infoPanelClose {
      position: absolute; top: 10px; right: 14px; z-index: 11;
      background: none; border: none; color: #888; font-size: 20px; cursor: pointer;
      line-height: 1;
    }
    #infoPanelClose:hover { color: #fff; }
    #infoPanelContent { padding: 0; }

    /* Control panel */
    #controls {
      position: absolute; top: 16px; left: 60px; z-index: 10;
      background: rgba(20, 20, 40, 0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 16px 18px; width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-height: calc(100vh - 32px); overflow-y: auto;
    }
    #controls h1 {
      font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
      margin-bottom: 4px; color: #fff;
    }
    #controls .subtitle {
      font-size: 11px; color: #888; margin-bottom: 14px;
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .control-group { margin-bottom: 12px; }
    .control-group label {
      display: block; font-size: 11px; font-weight: 600;
      color: #aaa; text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .control-group select, .control-group input[type="range"] {
      width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 6px; padding: 6px 8px; font-size: 13px;
      outline: none;
    }
    .control-group select:focus { border-color: rgba(255,255,255,0.3); }
    .control-group input[type="range"] { padding: 0; height: 6px; -webkit-appearance: none; appearance: none; border: none; background: transparent; }
    .control-group input[type="range"]::-webkit-slider-track { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; }
    .control-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #4fc3f7; border-radius: 50%; margin-top: -5px; cursor: pointer; }
    .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: #777; margin-top: 3px; }
    .stat-row {
      display: flex; justify-content: space-between; padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .stat-label { font-size: 11px; color: #888; }
    .stat-value { font-size: 13px; font-weight: 700; color: #fff; }
    #stats { margin-top: 8px; }

    /* Legend */
    #legend {
      position: absolute; bottom: 30px; left: 60px; z-index: 10;
      background: rgba(20, 20, 40, 0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .legend-item { display: flex; align-items: center; margin: 3px 0; }
    .legend-line { width: 28px; height: 3px; border-radius: 2px; margin-right: 8px; }
    .legend-label { font-size: 11px; color: #ccc; }

    /* Animation toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .toggle-label { font-size: 12px; color: #ccc; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.15); border-radius: 10px; transition: 0.2s; }
    .toggle input:checked + .toggle-track { background: #4fc3f7; }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked ~ .toggle-knob { left: 18px; }

    /* Storm search section */
    .search-section {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 12px;
      margin-top: 4px;
      margin-bottom: 12px;
    }
    .search-section .section-title {
      font-size: 12px; font-weight: 700; color: #4fc3f7;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    #stormSearch {
      width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 6px; padding: 7px 10px; font-size: 13px;
      outline: none; margin-bottom: 6px;
    }
    #stormSearch::placeholder { color: #666; }
    #stormSearch:focus { border-color: rgba(79,195,247,0.5); }
    #searchResults {
      max-height: 140px; overflow-y: auto; margin-bottom: 8px;
    }
    #searchResults::-webkit-scrollbar { width: 4px; }
    #searchResults::-webkit-scrollbar-track { background: transparent; }
    #searchResults::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .search-result-item {
      padding: 6px 10px; cursor: pointer; border-radius: 4px;
      font-size: 12px; color: #ccc; transition: background 0.15s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .search-result-item:hover { background: rgba(255,255,255,0.1); }
    .search-result-item.selected { background: rgba(79,195,247,0.2); color: #fff; }
    .search-result-item .storm-cat {
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 8px; text-transform: uppercase;
    }
    #playBtn {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      background: #4fc3f7; color: #1a1a2e; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #playBtn:hover { background: #81d4fa; }
    #playBtn:disabled { background: rgba(255,255,255,0.1); color: #555; cursor: not-allowed; }
    #stopBtn {
      width: 100%; padding: 8px; border: 1px solid #ef5350; border-radius: 6px;
      background: transparent; color: #ef5350; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 6px; display: none;
    }
    #stopBtn:hover { background: rgba(239,83,80,0.15); }

    /* Playback transport controls */
    #transportControls {
      display: none; justify-content: center; gap: 6px; margin-top: 6px;
    }
    #transportControls.visible { display: flex; }
    .transport-btn {
      width: 40px; height: 34px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
      background: rgba(255,255,255,0.06); color: #ccc; font-size: 16px;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .transport-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); }
    .transport-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .transport-btn:disabled:hover { background: rgba(255,255,255,0.06); color: #ccc; border-color: rgba(255,255,255,0.2); }


    /* Narrative section */
    .narrative-section {
      padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .narrative-section .section-label {
      font-size: 10px; font-weight: 700; color: #4fc3f7; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .narrative-text {
      font-size: 13px; line-height: 1.6; color: #ccc;
    }
    .retired-badge {
      display: inline-block; padding: 3px 10px; border-radius: 10px;
      background: rgba(239,83,80,0.2); border: 1px solid rgba(239,83,80,0.4);
      font-size: 10px; font-weight: 700; color: #ef5350; text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* Landfall cards */
    .landfall-section {
      padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .landfall-section .section-label {
      font-size: 10px; font-weight: 700; color: #FFD700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .landfall-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
      border-left: 3px solid #FFD700;
    }
    .landfall-card .lf-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
    }
    .landfall-card .lf-location {
      font-size: 13px; font-weight: 700; color: #e0e0e0;
    }
    .landfall-card .lf-cat {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px; color: #fff;
    }
    .landfall-card .lf-details {
      font-size: 11px; color: #999; display: flex; gap: 12px; flex-wrap: wrap;
    }
    .landfall-card .lf-details span { white-space: nowrap; }

    /* Storm stats section */
    .storm-stats-section {
      padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .storm-stats-section .section-label {
      font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .storm-stat-row {
      display: flex; justify-content: space-between; padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .storm-stat-row:last-child { border-bottom: none; }
    .storm-stat-label { font-size: 11px; color: #888; }
    .storm-stat-val { font-size: 12px; font-weight: 700; color: #e0e0e0; }

    /* Monthly chart */
    #monthlyChart {
      border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; margin-top: 8px;
    }
    #monthlyChart .section-label {
      font-size: 10px; font-weight: 700; color: #4fc3f7; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .month-bar-row {
      display: flex; align-items: center; margin-bottom: 3px;
    }
    .month-bar-label {
      width: 28px; font-size: 9px; color: #888; text-align: right; margin-right: 6px;
      flex-shrink: 0;
    }
    .month-bar-track {
      flex: 1; height: 12px; background: rgba(255,255,255,0.06); border-radius: 2px;
      overflow: hidden; position: relative;
    }
    .month-bar-fill {
      height: 100%; background: #4fc3f7; border-radius: 2px; transition: width 0.4s;
    }
    /* Tools panel tabs */
    .tools-tabs {
      display: flex; border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0; overflow-x: auto;
    }
    .tools-tab {
      padding: 10px 14px; font-size: 11px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.3px; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tools-tab:hover { color: #ccc; }
    .tools-tab.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
    .tools-content { padding: 14px 20px; }
    .tools-content .record-item {
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .tools-content .record-item:last-child { border-bottom: none; }
    .tools-content .record-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }
    .tools-content .record-value { font-size: 14px; font-weight: 700; color: #fff; margin-top: 2px; }
    .tools-content .record-detail { font-size: 11px; color: #999; margin-top: 1px; }
    .tools-content .record-clickable { cursor: pointer; border-radius: 4px; padding: 8px; margin: 0 -8px; }
    .tools-content .record-clickable:hover { background: rgba(255,255,255,0.05); }

    /* Season summary */
    .season-input { display: flex; gap: 8px; margin-bottom: 12px; }
    .season-input input {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 6px; padding: 6px 8px; font-size: 13px; outline: none;
    }
    .season-storm-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
    }
    .season-storm-row:hover { background: rgba(255,255,255,0.03); }
    .season-storm-name { font-size: 12px; color: #e0e0e0; }
    .season-storm-dates { font-size: 10px; color: #888; }

    /* Landfall stats */
    .lf-stat-bar {
      display: flex; align-items: center; margin-bottom: 4px;
    }
    .lf-stat-label {
      width: 80px; font-size: 10px; color: #ccc; text-align: right;
      margin-right: 8px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .lf-stat-track { flex: 1; height: 14px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .lf-stat-fill { height: 100%; background: #FFD700; border-radius: 2px; transition: width 0.4s; }
    .lf-stat-count { width: 30px; font-size: 10px; color: #888; text-align: left; margin-left: 4px; }

    /* Intelligence modal */
    #intelBtn {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 12;
      background: rgba(79,195,247,0.15); border: 1px solid rgba(79,195,247,0.4);
      color: #4fc3f7; border-radius: 8px; padding: 8px 20px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.5px;
      backdrop-filter: blur(8px); transition: all 0.2s;
    }
    #intelBtn:hover { background: rgba(79,195,247,0.25); color: #fff; }
    #intelOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 100; justify-content: center; align-items: center;
    }
    #intelOverlay.open { display: flex; }
    #intelModal {
      width: 80%; height: 80%; max-width: 1100px;
      background: rgba(20, 20, 40, 0.98); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    #intelModal .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #intelModal .modal-title { font-size: 22px; font-weight: 700; color: #fff; }
    #intelModal .modal-close {
      background: none; border: none; color: #888; font-size: 22px; cursor: pointer; line-height: 1;
    }
    #intelModal .modal-close:hover { color: #fff; }
    #intelModal .modal-tabs {
      display: flex; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 24px;
    }
    #intelModal .modal-tab {
      padding: 14px 22px; font-size: 14px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.4px; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    #intelModal .modal-tab:hover { color: #ccc; }
    #intelModal .modal-tab.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }
    #intelModal .modal-body {
      flex: 1; overflow-y: auto; padding: 28px 32px; font-size: 14px;
    }

    /* Record cards */
    .record-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .record-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
    .record-card .rc-icon {
      width: 48px; height: 48px; border-radius: 10px; display: flex;
      align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .record-card .rc-info { flex: 1; }
    .record-card .rc-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: 600; letter-spacing: 0.4px; }
    .record-card .rc-value { font-size: 20px; font-weight: 700; color: #fff; margin-top: 3px; }
    .record-card .rc-detail { font-size: 14px; color: #999; margin-top: 3px; }
    .record-card .rc-stat {
      text-align: right; flex-shrink: 0;
    }
    .record-card .rc-stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
    .record-card .rc-stat-unit { font-size: 11px; color: #888; text-transform: uppercase; }

    /* Records grid for summary stats */
    .records-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px;
    }
    .records-grid .rg-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 14px; text-align: center;
    }
    .records-grid .rg-num { font-size: 32px; font-weight: 700; color: #fff; }
    .records-grid .rg-label { font-size: 12px; color: #888; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.3px; }

    /* Season table in modal */
    .season-table { width: 100%; border-collapse: collapse; }
    .season-table th {
      text-align: left; font-size: 12px; color: #888; text-transform: uppercase;
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 0.3px;
    }
    .season-table td {
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 14px; color: #e0e0e0;
    }
    .season-table tr { cursor: pointer; transition: background 0.15s; }
    .season-table tr:hover { background: rgba(255,255,255,0.04); }

    /* Landfall bars in modal — wider */
    .lf-modal-bar { display: flex; align-items: center; margin-bottom: 8px; }
    .lf-modal-label { width: 130px; font-size: 14px; color: #ccc; text-align: right; margin-right: 14px; }
    .lf-modal-track { flex: 1; height: 24px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .lf-modal-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .lf-modal-count { width: 44px; font-size: 14px; color: #999; margin-left: 10px; font-weight: 700; }

    /* Decade chart bars in modal */
    .decade-row { margin-bottom: 8px; }
    .decade-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
    .decade-bars { display: flex; gap: 2px; height: 16px; }
    .decade-bar { border-radius: 2px; transition: width 0.4s; }

    /* Map options (basemap switcher) */
    #mapOptions {
      position: absolute; bottom: 30px; left: 260px; z-index: 10;
      background: rgba(20, 20, 40, 0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 6px 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    /* Collapse controls during playback */
    #controlsCollapsible {
      max-height: 600px; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s;
      opacity: 1;
    }
    #controlsCollapsible.collapsed {
      max-height: 0; opacity: 0; margin: 0; padding: 0;
    }

    .month-bar-count {
      width: 28px; font-size: 9px; color: #888; text-align: left; margin-left: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>
  <button id="intelBtn">Intelligence</button>

  <div id="intelOverlay">
    <div id="intelModal">
      <div class="modal-header">
        <span class="modal-title">Hurricane Intelligence</span>
        <button class="modal-close" id="intelClose">&times;</button>
      </div>
      <div class="modal-tabs">
        <div class="modal-tab active" data-mtool="records">Records</div>
        <div class="modal-tab" data-mtool="season">Season</div>
        <div class="modal-tab" data-mtool="landfalls">Landfalls</div>
        <div class="modal-tab" data-mtool="monthly">Monthly</div>
        <div class="modal-tab" data-mtool="decades">Decades</div>
        <div class="modal-tab" data-mtool="finder">Finder</div>
        <div class="modal-tab" data-mtool="compare">Compare</div>
      </div>
      <div class="modal-body" id="modalContent"></div>
    </div>
  </div>

  <div id="infoPanel">
    <button id="infoPanelClose">&times;</button>
    <div id="infoPanelContent"></div>
    <div id="stormExtras"></div>
  </div>


  <div id="controls">
    <h1>Atlantic Hurricane Tracks</h1>
    <div class="subtitle">NOAA HURDAT2 &bull; 1851–2025</div>

    <!-- Storm Search -->
    <div class="search-section">
      <div class="section-title">Storm Playback</div>
      <input type="text" id="stormSearch" placeholder="Search storm name (e.g. Katrina)..." />
      <div id="searchResults"></div>
      <button id="playBtn" disabled>Play Storm</button>
      <div id="transportControls">
        <button class="transport-btn" id="stepBackBtn" title="Step Back">&#9198;</button>
        <button class="transport-btn" id="pauseBtn" title="Pause/Resume">&#9208;</button>
        <button class="transport-btn" id="stepFwdBtn" title="Step Forward">&#9197;</button>
      </div>
      <button id="stopBtn">Stop Playback</button>
    </div>

    <div id="controlsCollapsible">
      <div class="toggle-row">
        <span class="toggle-label">Animate Storm Path</span>
        <label class="toggle">
          <input type="checkbox" id="animToggle" />
          <span class="toggle-track"></span>
          <span class="toggle-knob"></span>
        </label>
      </div>

      <div class="control-group">
        <label>Minimum Category</label>
        <select id="catFilter">
          <option value="-1">All Storms (TD+)</option>
          <option value="0">Tropical Storm+</option>
          <option value="1">Category 1+</option>
          <option value="2">Category 2+</option>
          <option value="3" selected>Category 3+ (Major)</option>
          <option value="4">Category 4+</option>
          <option value="5">Category 5 Only</option>
        </select>
      </div>

      <div class="control-group">
        <label>Year Range</label>
        <div style="display:flex;gap:8px;">
          <input type="number" id="yearStart" value="2000" min="1851" max="2025" style="width:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:6px 8px;font-size:13px;" />
          <input type="number" id="yearEnd" value="2025" min="1851" max="2025" style="width:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:6px 8px;font-size:13px;" />
        </div>
      </div>

      <div class="control-group">
        <label>Animation Speed</label>
        <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="4" />
        <div class="range-labels"><span>Slow</span><span>Fast</span></div>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Show All Landfalls</span>
        <label class="toggle">
          <input type="checkbox" id="landfallToggle" checked />
          <span class="toggle-track"></span>
          <span class="toggle-knob"></span>
        </label>
      </div>

    </div>
  </div>

  <div id="mapOptions">
    <button id="viewToggle" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#ccc;border-radius:4px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;margin-right:6px;">3D</button>
    <select id="basemapSelect" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:4px;padding:4px 6px;font-size:10px;outline:none;cursor:pointer;">
      <option value="dark-gray-vector" selected>Dark Gray</option>
      <option value="gray-vector">Light Gray</option>
      <option value="satellite">Satellite</option>
      <option value="hybrid">Hybrid</option>
      <option value="oceans">Oceans</option>
      <option value="streets-night-vector">Streets Night</option>
      <option value="topo-vector">Topographic</option>
    </select>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-line" style="background:#78909c;"></div><span class="legend-label">Tropical Depression</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#1565C0;height:3px;"></div><span class="legend-label">Tropical Storm</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#00695c;height:4px;"></div><span class="legend-label">Category 1</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#e65100;height:4px;"></div><span class="legend-label">Category 2</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#d84315;height:5px;"></div><span class="legend-label">Category 3</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#b71c1c;height:5px;"></div><span class="legend-label">Category 4</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#7f0000;height:6px;"></div><span class="legend-label">Category 5</span></div>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/views/SceneView",
      "esri/layers/FeatureLayer",
      "esri/layers/GraphicsLayer",
      "esri/Graphic",
      "esri/renderers/UniqueValueRenderer",
      "esri/core/reactiveUtils",
      "esri/widgets/Home"
    ], function(Map, MapView, SceneView, FeatureLayer, GraphicsLayer, Graphic, UniqueValueRenderer, reactiveUtils, Home) {

      const SEGMENTS_URL = "https://services7.arcgis.com/1J4A0YH8gSNAmQVQ/arcgis/rest/services/Atlantic_Hurricane_Track_Segments_1851_2025/FeatureServer/0";
      const SUMMARY_URL = "https://services7.arcgis.com/1J4A0YH8gSNAmQVQ/arcgis/rest/services/Atlantic_Hurricanes_1851_2025/FeatureServer/0";
      const POINTS_URL = "https://services7.arcgis.com/1J4A0YH8gSNAmQVQ/arcgis/rest/services/Atlantic_Hurricane_Tracks_1851_2025/FeatureServer/0";

      // Saffir-Simpson colors (hex for symbols)
      const CAT_COLORS_HEX = {
        "-1": "#78909c", "0": "#1565C0", "1": "#00695c",
        "2": "#e65100", "3": "#d84315", "4": "#b71c1c", "5": "#7f0000"
      };
      const CAT_COLORS_RGB = {
        "-1": [120, 144, 156], "0": [21, 101, 192], "1": [0, 105, 92],
        "2": [230, 81, 0], "3": [216, 67, 21], "4": [183, 28, 28], "5": [127, 0, 0]
      };
      const CAT_WIDTHS = { "-1": 0.75, "0": 1.0, "1": 1.5, "2": 2.0, "3": 2.75, "4": 3.5, "5": 4.5 };
      const CAT_LABELS = {
        "-1": "Tropical Depression", "0": "Tropical Storm", "1": "Category 1",
        "2": "Category 2", "3": "Category 3 (Major)", "4": "Category 4 (Major)", "5": "Category 5 (Major)"
      };

      // Format datetime — handles epoch ms from AGOL or string dates
      function formatDateTime(val) {
        if (val == null || val === "") return "";
        if (typeof val === "number" || /^\d{10,13}$/.test(String(val))) {
          var d = new Date(typeof val === "number" ? val : parseInt(val));
          if (isNaN(d.getTime())) return String(val);
          // Convert UTC to EST (UTC-5)
          var est = new Date(d.getTime() - 5 * 60 * 60 * 1000);
          var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          return months[est.getUTCMonth()] + " " + est.getUTCDate() + ", " + est.getUTCFullYear() +
            " " + String(est.getUTCHours()).padStart(2,"0") + ":" + String(est.getUTCMinutes()).padStart(2,"0") + " EST";
        }
        return String(val);
      }

      function formatDate(val) {
        if (val == null || val === "") return "";
        if (typeof val === "number" || /^\d{10,13}$/.test(String(val))) {
          var d = new Date(typeof val === "number" ? val : parseInt(val));
          if (isNaN(d.getTime())) return String(val);
          var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          return months[d.getUTCMonth()] + " " + d.getUTCDate() + ", " + d.getUTCFullYear();
        }
        // Parse YYYY-MM-DD string
        if (/^\d{4}-\d{2}-\d{2}/.test(String(val))) {
          var parts = String(val).split(/[-T ]/);
          var months2 = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          return months2[parseInt(parts[1])-1] + " " + parseInt(parts[2]) + ", " + parts[0];
        }
        return String(val);
      }

      let animationSpeed = 4; // slider value (80%)
      let selectedStorm = null;
      let playbackActive = false;
      let playbackPaused = false;
      let playbackIdx = 0;
      let playbackTimeout = null;

      // Simple line symbol for each category
      function buildLineSymbol(catNum) {
        var color = CAT_COLORS_RGB[catNum] || CAT_COLORS_RGB["-1"];
        var width = CAT_WIDTHS[catNum] || 0.75;
        return {
          type: "simple-line",
          color: [...color, 200],
          width: width,
          cap: "round",
          join: "round"
        };
      }

      // Build renderer with simple line symbols
      function buildRenderer() {
        return new UniqueValueRenderer({
          field: "category_num",
          defaultSymbol: buildLineSymbol("-1"),
          defaultLabel: "Other",
          uniqueValueInfos: Object.keys(CAT_COLORS_HEX).map(function(cat) {
            return {
              value: parseInt(cat),
              label: CAT_LABELS[cat],
              symbol: buildLineSymbol(cat)
            };
          })
        });
      }

      // Popup template
      var segmentPopupTemplate = {
        title: "{name} ({year})",
        content: [{
          type: "custom",
          creator: function(event) {
            var g = event.graphic;
            var a = g.attributes;
            var catNum = a.category_num != null ? a.category_num : -1;
            var headerBg = CAT_COLORS_HEX[catNum] || "#546e7a";
            var windKt = a.wind_kt || 0;
            var windMph = a.wind_mph || 0;
            var pres = a.pressure_mb;
            var presF = (pres && pres > 0 && pres < 9999) ? pres + " mb" : "N/A";
            var windBarW = windKt > 0 ? Math.min(Math.round((windKt / 170) * 100), 100) : 0;
            var cat = a.category || "Unknown";
            var peakCat = a.peak_category || "Unknown";
            var isLandfall = a.is_landfall === 1;
            var statuses = { HU: "Hurricane", TS: "TS", TD: "TD", EX: "Extratropical", SS: "SS", SD: "SD" };
            var statusLabel = statuses[a.status] || a.status || "";

            var div = document.createElement("div");
            div.style.cssText = "font-family:system-ui,sans-serif;max-width:340px;color:#1a1a1a;line-height:1.4;";
            div.innerHTML =
              '<div style="background:' + headerBg + ';padding:14px 16px;margin:-12px -12px 0 -12px;border-radius:4px 4px 0 0;">' +
                '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
                  '<div>' +
                    '<div style="font-size:20px;font-weight:700;color:#fff;">' + (a.name || "UNNAMED") + '</div>' +
                    '<div style="font-size:13px;color:rgba(255,255,255,0.85);margin-top:2px;">' + a.year + ' Atlantic Season</div>' +
                  '</div>' +
                  '<div style="text-align:right;">' +
                    '<div style="font-size:26px;font-weight:700;color:#fff;line-height:1;">' + windKt + '</div>' +
                    '<div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.5px;">knots</div>' +
                  '</div>' +
                '</div>' +
                '<div style="margin-top:8px;display:flex;align-items:center;gap:8px;">' +
                  '<span style="padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;">' + cat + '</span>' +
                  (isLandfall ? '<span style="padding:3px 10px;border-radius:10px;background:#FFD700;font-size:11px;font-weight:700;color:#333;">LANDFALL</span>' : '') +
                '</div>' +
              '</div>' +
              '<div style="display:flex;justify-content:space-between;padding:10px 16px;background:#f5f5f5;border-bottom:1px solid #ddd;">' +
                '<div style="text-align:center;flex:1;">' +
                  '<div style="font-size:10px;color:#777;text-transform:uppercase;font-weight:600;">Wind</div>' +
                  '<div style="font-size:15px;font-weight:700;color:' + headerBg + ';">' + windMph + ' mph</div>' +
                '</div>' +
                '<div style="text-align:center;flex:1;border-left:1px solid #ddd;border-right:1px solid #ddd;">' +
                  '<div style="font-size:10px;color:#777;text-transform:uppercase;font-weight:600;">Pressure</div>' +
                  '<div style="font-size:15px;font-weight:700;color:#333;">' + presF + '</div>' +
                '</div>' +
                '<div style="text-align:center;flex:1;">' +
                  '<div style="font-size:10px;color:#777;text-transform:uppercase;font-weight:600;">Status</div>' +
                  '<div style="font-size:12px;font-weight:700;color:#333;">' + statusLabel + '</div>' +
                '</div>' +
              '</div>' +
              '<div style="padding:10px 16px;">' +
                '<div style="font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">Wind Intensity</div>' +
                '<div style="background:#ddd;border-radius:4px;height:16px;overflow:hidden;position:relative;">' +
                  '<div style="background:' + headerBg + ';width:' + windBarW + '%;height:100%;border-radius:4px;min-width:' + (windKt > 0 ? 24 : 0) + 'px;"></div>' +
                  (windKt > 0 ? '<span style="position:absolute;top:1px;left:6px;font-size:10px;font-weight:700;color:#fff;">' + windKt + ' kt</span>' : '') +
                '</div>' +
                '<div style="display:flex;justify-content:space-between;margin-top:2px;font-size:9px;color:#aaa;">' +
                  '<span>TD</span><span style="color:#1565C0">TS</span><span style="color:#00695c">H1</span><span style="color:#e65100">H2</span><span style="color:#d84315">H3</span><span style="color:#b71c1c">H4</span><span style="color:#7f0000">H5</span>' +
                '</div>' +
              '</div>' +
              '<div style="padding:4px 16px 10px 16px;display:flex;gap:8px;">' +
                '<div style="flex:1;padding:8px;background:#f0f0f0;border-radius:4px;border-left:3px solid ' + (CAT_COLORS_HEX[a.peak_category_num] || '#777') + ';">' +
                  '<div style="font-size:9px;color:#666;text-transform:uppercase;font-weight:700;">Storm Peak</div>' +
                  '<div style="font-size:14px;font-weight:700;color:' + (CAT_COLORS_HEX[a.peak_category_num] || '#777') + ';">' + peakCat + '</div>' +
                '</div>' +
                '<div style="flex:1;padding:8px;background:#f0f0f0;border-radius:4px;border-left:3px solid #455a64;">' +
                  '<div style="font-size:9px;color:#666;text-transform:uppercase;font-weight:700;">Observation</div>' +
                  '<div style="font-size:12px;font-weight:700;color:#333;">' + formatDateTime(a.datetime) + '</div>' +
                  '<div style="font-size:10px;color:#666;">Segment ' + (a.segment_num || '') + '</div>' +
                '</div>' +
              '</div>' +
              '<div style="padding:6px 16px 8px 16px;border-top:1px solid #ddd;">' +
                '<div style="font-size:9px;color:#999;">NOAA NHC HURDAT2 · ' + (a.storm_id || '') + '</div>' +
              '</div>';
            return div;
          }
        }]
      };

      // Graphics layer for storm playback animation
      var animationLayer = new GraphicsLayer({
        title: "Storm Animation",
        listMode: "hide"
      });

      // Create segments layer
      var segmentsLayer = new FeatureLayer({
        url: SEGMENTS_URL,
        title: "Storm Track Segments",
        renderer: buildRenderer(),
        definitionExpression: "storm_id IN ('AL122005','AL142024','AL092017','AL182012')",
        popupTemplate: segmentPopupTemplate,
        outFields: ["*"]
      });

      // Summary table for storm search
      var summaryTable = new FeatureLayer({
        url: SUMMARY_URL,
        outFields: ["*"]
      });

      var landfallLayer = new FeatureLayer({
        url: POINTS_URL,
        title: "Landfall Points",
        definitionExpression: "is_landfall = 1 AND storm_id IN ('AL122005','AL142024','AL092017','AL182012')",
        renderer: {
          type: "unique-value",
          field: "category_num",
          defaultSymbol: { type: "simple-marker", style: "diamond", color: [150,150,150,180], size: 5, outline: { color: [255,255,255,200], width: 1 } },
          uniqueValueInfos: Object.keys(CAT_COLORS_RGB).filter(function(k) { return parseInt(k) >= 1; }).map(function(cat) {
            return {
              value: parseInt(cat),
              label: CAT_LABELS[cat],
              symbol: {
                type: "simple-marker",
                style: "diamond",
                color: [...CAT_COLORS_RGB[cat], 220],
                size: 5 + parseInt(cat) * 2.5,
                outline: { color: [255,255,255,220], width: 1.25 }
              }
            };
          })
        },
        popupTemplate: {
          title: "Landfall: {name} ({year})",
          content: [{
            type: "custom",
            creator: function(event) {
              var la = event.graphic.attributes;
              var div = document.createElement("div");
              div.style.cssText = "font-family:system-ui,sans-serif;padding:4px 0;";
              var lfCatNum = la.category_num != null ? String(la.category_num) : "-1";
              var lfColor = CAT_COLORS_HEX[lfCatNum] || "#78909c";
              div.innerHTML =
                '<div style="margin-bottom:6px;"><span style="padding:3px 10px;border-radius:8px;background:' + lfColor + ';color:#fff;font-size:11px;font-weight:700;">' + (la.category || "Unknown") + '</span>' +
                (la.landfall_state ? ' <span style="font-size:13px;font-weight:600;color:#333;">' + la.landfall_state + '</span>' : '') + '</div>' +
                '<div style="font-size:13px;color:#333;margin-bottom:4px;"><strong>Date:</strong> ' + formatDateTime(la.datetime) + '</div>' +
                '<div style="font-size:13px;color:#333;margin-bottom:4px;"><strong>Wind:</strong> ' + (la.wind_kt || "—") + ' kt / ' + (la.wind_mph || "—") + ' mph</div>' +
                '<div style="font-size:13px;color:#333;"><strong>Pressure:</strong> ' + ((la.pressure_mb && la.pressure_mb > 0) ? la.pressure_mb + ' mb' : 'N/A') + '</div>';
              return div;
            }
          }]
        },
        outFields: ["*"]
      });

      var map = new Map({
        basemap: "dark-gray-vector",
        layers: [segmentsLayer, landfallLayer, animationLayer]
      });

      var is3D = false;
      var viewPadding = { left: 300, right: 400, top: 20, bottom: 20 };

      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-75, 27],
        zoom: 4,
        padding: viewPadding,
        constraints: { minZoom: 3 },
        popup: null
      });

      // Home button
      var homeWidget = new Home({ view: view });
      view.ui.add(homeWidget, "top-left");

      // Basemap switcher
      document.getElementById("basemapSelect").addEventListener("change", function(e) {
        map.basemap = e.target.value;
      });

      // 3D/2D toggle
      document.getElementById("viewToggle").addEventListener("click", function() {
        var center = view.center;
        var zoom = view.zoom;
        view.container = null;

        if (!is3D) {
          view = new SceneView({
            container: "viewDiv",
            map: map,
            camera: {
              position: { longitude: center.longitude, latitude: center.latitude, z: 8000000 },
              tilt: 0
            },
            padding: viewPadding,
            popup: null,
            environment: {
              atmosphereEnabled: true,
              starsEnabled: true,
              atmosphere: { quality: "high" }
            }
          });
          document.getElementById("viewToggle").textContent = "2D";
          document.getElementById("viewToggle").style.color = "#4fc3f7";
        } else {
          view = new MapView({
            container: "viewDiv",
            map: map,
            center: [center.longitude, center.latitude],
            zoom: zoom || 4,
            padding: viewPadding,
            constraints: { minZoom: 3 },
            popup: null
          });
          document.getElementById("viewToggle").textContent = "3D";
          document.getElementById("viewToggle").style.color = "#ccc";
        }
        is3D = !is3D;

        // Re-add home widget
        homeWidget = new Home({ view: view });
        view.ui.add(homeWidget, "top-left");

        // Re-bind click handler
        bindClickHandler();
      });

      function updateStats() { /* removed */ }

      // Filter controls
      function applyFilter() {
        var minCat = document.getElementById("catFilter").value;
        var yearStart = document.getElementById("yearStart").value;
        var yearEnd = document.getElementById("yearEnd").value;

        var where = "peak_category_num >= " + minCat;
        where += " AND year >= " + yearStart + " AND year <= " + yearEnd;

        segmentsLayer.definitionExpression = where;
        landfallLayer.definitionExpression = "is_landfall = 1 AND category_num >= " + minCat + " AND year >= " + yearStart + " AND year <= " + yearEnd;

        updateStats();
      }

      document.getElementById("catFilter").addEventListener("change", applyFilter);
      document.getElementById("yearStart").addEventListener("change", applyFilter);
      document.getElementById("yearEnd").addEventListener("change", applyFilter);

      // Landfall toggle
      document.getElementById("landfallToggle").addEventListener("change", function(e) {
        landfallLayer.visible = e.target.checked;
      });

      var MONTH_ABBRS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      // Animate Storm Path toggle — dims the base segments layer during playback-style viewing
      document.getElementById("animToggle").addEventListener("change", function(e) {
        segmentsLayer.opacity = e.target.checked ? 0.3 : 1.0;
      });

      // Speed control
      document.getElementById("speedSlider").addEventListener("input", function(e) {
        animationSpeed = parseFloat(e.target.value);
      });

      // ========== STORM SEARCH & PLAYBACK ==========

      var searchInput = document.getElementById("stormSearch");
      var searchResults = document.getElementById("searchResults");
      var playBtn = document.getElementById("playBtn");
      var stopBtn = document.getElementById("stopBtn");
      // Banner removed — info panel shows storm details

      var searchDebounce = null;

      searchInput.addEventListener("input", function() {
        var val = searchInput.value.trim();
        if (searchDebounce) clearTimeout(searchDebounce);
        if (val.length < 2) {
          loadFeaturedStorms();
          return;
        }
        searchDebounce = setTimeout(function() {
          searchStorms(val);
        }, 300);
      });

      function searchStorms(term) {
        var query = summaryTable.createQuery();
        query.where = "UPPER(name) LIKE '%" + term.toUpperCase().replace(/'/g, "''") + "%'";
        query.outFields = ["storm_id", "name", "year", "category", "category_num"];
        query.orderByFields = ["year DESC"];
        query.returnGeometry = false;
        query.num = 30;

        summaryTable.queryFeatures(query).then(function(result) {
          searchResults.innerHTML = "";
          if (result.features.length === 0) {
            searchResults.innerHTML = '<div style="padding:6px 10px;font-size:12px;color:#666;">No storms found</div>';
            return;
          }
          result.features.forEach(function(f) {
            var a = f.attributes;
            var catColor = CAT_COLORS_HEX[a.category_num] || "#78909c";
            var item = document.createElement("div");
            item.className = "search-result-item";
            item.innerHTML =
              '<span>' + (a.name || "UNNAMED") + ' (' + a.year + ')</span>' +
              '<span class="storm-cat" style="background:' + catColor + ';color:#fff;">' + (a.category || "TD") + '</span>';
            item.addEventListener("click", function() {
              // Clear any existing playback/highlight when selecting a new storm
              if (playbackActive) {
                stopPlayback();
              } else {
                animationLayer.removeAll();
                segmentsLayer.visible = true;
                segmentsLayer.opacity = document.getElementById("animToggle").checked ? 0.3 : 1.0;
                lastLoadedExtrasId = null;
              }
              var prev = searchResults.querySelector(".selected");
              if (prev) prev.classList.remove("selected");
              item.classList.add("selected");
              selectedStorm = {
                storm_id: a.storm_id,
                name: a.name || "UNNAMED",
                year: a.year,
                peak_category: a.category || "TD",
                peak_category_num: a.category_num
              };
              playBtn.disabled = false;
              playBtn.textContent = "Play " + selectedStorm.name + " (" + selectedStorm.year + ")";
            });
            searchResults.appendChild(item);
          });
        }).catch(function(err) {
          console.error("Storm search error:", err);
          searchResults.innerHTML = '<div style="padding:6px 10px;font-size:12px;color:#ef5350;">Search error</div>';
        });
      }

      // Play storm animation
      playBtn.addEventListener("click", function() {
        if (!selectedStorm || playbackActive) return;
        playStorm(selectedStorm);
      });

      stopBtn.addEventListener("click", function() {
        stopPlayback();
      });

      // Transport controls
      var transportControls = document.getElementById("transportControls");
      var pauseBtn = document.getElementById("pauseBtn");
      var stepBackBtn = document.getElementById("stepBackBtn");
      var stepFwdBtn = document.getElementById("stepFwdBtn");

      pauseBtn.addEventListener("click", function() {
        if (!playbackActive) return;
        if (!playbackPaused) {
          // Pause
          playbackPaused = true;
          if (playbackTimeout) { clearTimeout(playbackTimeout); playbackTimeout = null; }
          pauseBtn.innerHTML = "&#9654;"; // play symbol
          pauseBtn.title = "Resume";
          stepBackBtn.disabled = false;
          stepFwdBtn.disabled = false;
          updateBannerForIdx(playbackIdx);
        } else {
          // Resume
          playbackPaused = false;
          pauseBtn.innerHTML = "&#9208;"; // pause symbol
          pauseBtn.title = "Pause";
          stepBackBtn.disabled = true;
          stepFwdBtn.disabled = true;
          drawLoop(playbackIdx + 1);
        }
      });

      stepFwdBtn.addEventListener("click", function() {
        if (!playbackActive || !playbackPaused || !playbackFeatures) return;
        var nextIdx = playbackIdx + 1;
        if (nextIdx >= playbackFeatures.length) return; // at end

        playbackIdx = nextIdx;
        var f = playbackFeatures[nextIdx];
        var catNum = f.attributes.category_num != null ? String(f.attributes.category_num) : "-1";
        var color = CAT_COLORS_RGB[catNum] || CAT_COLORS_RGB["-1"];
        var width = CAT_WIDTHS[catNum] || 0.75;

        // Glow
        animationLayer.add(new Graphic({
          geometry: f.geometry,
          symbol: { type: "simple-line", color: [...color, 50], width: width + 5, cap: "round", join: "round" }
        }));
        // Main line
        animationLayer.add(new Graphic({
          geometry: f.geometry,
          symbol: { type: "simple-line", color: [...color, 240], width: width + 0.5, cap: "round", join: "round" },
          attributes: f.attributes
        }));

        showInfoPanel(f.attributes);
        updateBannerForIdx(nextIdx);
      });

      stepBackBtn.addEventListener("click", function() {
        if (!playbackActive || !playbackPaused || !playbackFeatures) return;
        if (playbackIdx <= 0) return; // at start

        // Remove last 2 graphics (glow + main line)
        var graphics = animationLayer.graphics;
        if (graphics.length >= 2) {
          animationLayer.remove(graphics.getItemAt(graphics.length - 1));
          animationLayer.remove(graphics.getItemAt(graphics.length - 1));
        }

        playbackIdx--;
        if (playbackFeatures[playbackIdx]) {
          showInfoPanel(playbackFeatures[playbackIdx].attributes);
        }
        updateBannerForIdx(playbackIdx);
      });

      // Feature info panel helpers
      var infoPanel = document.getElementById("infoPanel");
      var infoPanelContent = document.getElementById("infoPanelContent");

      }

      var lastLoadedExtrasId = null;

            '<div style="background:rgba(255,255,255,0.1);border-radius:4px;height:18px;overflow:hidden;position:relative;">' +

              (windKt > 0 ? '<span style="position:absolute;top:2px;left:6px;font-size:10px;font-weight:700;color:#fff;">' + windKt + ' kt</span>' : '') +

              '<div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:700;">Storm Peak</div>' +
              '<div style="font-size:16px;font-weight:700;color:' + (CAT_COLORS_HEX[a.peak_category_num] || '#777') + ';">' + peakCat + '</div>' +
            '</div>' +

          '</div>';

        infoPanel.classList.add("open");
        document.getElementById("viewDiv").classList.add("with-panel");
        setTimeout(function() { try { view.container.style.width = ""; } catch(e) {} }, 350);

        // Load narrative + landfall details (only if storm changed)
        if (a.storm_id && a.storm_id !== lastLoadedExtrasId) {

      // Load narrative, retired status, landfall cards, and storm stats
      // Uses direct REST API fetch to avoid ArcGIS SDK WebGL dependency
      function loadStormExtras(stormId, stormName, stormYear) {
        console.log("Loading extras for:", stormId);

        // 1. Query summary table via REST API
        var summaryParams = new URLSearchParams({
          f: 'json', where: "storm_id = '" + stormId.replace(/'/g, "''") + "'",
          outFields: '*', returnGeometry: 'false'
        });
        fetch(SUMMARY_URL + '/query?' + summaryParams).then(function(r) { return r.json(); }).then(function(result) {
          var features = result.features || [];
          if (features.length === 0) return;
          var sa = features[0].attributes;

          // Build extras HTML
          var extrasHtml = '';

          // Retired badge
          if (sa.is_retired === 1) {
            var badge = document.getElementById("retiredBadge");
            if (badge) {
              badge.className = "retired-badge";
              badge.textContent = "RETIRED NAME";
              badge.style.display = "inline-block";
            }
          }

          // Storm stats
          var durationDays = sa.duration_hours ? (sa.duration_hours / 24).toFixed(1) : "—";
          var startF = formatDate(sa.start_date);
          var endF = formatDate(sa.end_date);
          extrasHtml +=
            '<div class="storm-stats-section">' +
              '<div class="section-label">Storm Statistics</div>' +
              '<div class="storm-stat-row"><span class="storm-stat-label">Active Period</span><span class="storm-stat-val">' + startF + ' — ' + endF + '</span></div>' +
              '<div class="storm-stat-row"><span class="storm-stat-label">Duration</span><span class="storm-stat-val">' + durationDays + ' days</span></div>' +
              '<div class="storm-stat-row"><span class="storm-stat-label">Peak Wind</span><span class="storm-stat-val">' + (sa.max_wind_kt || "—") + ' kt / ' + (sa.max_wind_mph || "—") + ' mph</span></div>' +
              '<div class="storm-stat-row"><span class="storm-stat-label">Min Pressure</span><span class="storm-stat-val">' + (sa.min_pressure_mb || "N/A") + ' mb</span></div>' +
              '<div class="storm-stat-row"><span class="storm-stat-label">Observations</span><span class="storm-stat-val">' + (sa.observations || "—") + '</span></div>' +
              '<div class="storm-stat-row"><span class="storm-stat-label">Landfalls</span><span class="storm-stat-val">' + (sa.landfalls || 0) + '</span></div>' +
            '</div>';

          // Narrative
          if (sa.narrative) {
            extrasHtml +=
              '<div class="narrative-section">' +
                '<div class="section-label">Storm Narrative</div>' +
                '<div class="narrative-text">' + sa.narrative + '</div>' +
              '</div>';
          }

          // Set summary portion of extras
          var extrasDiv = document.getElementById("stormExtras");
          if (extrasDiv) extrasDiv.innerHTML = extrasHtml;
        }).catch(function(err) {
          console.error("Error loading storm summary:", err);
        });

        // 2. Query track points for landfall details via REST API
        var lfParams = new URLSearchParams({
          f: 'json',
          where: "storm_id = '" + stormId.replace(/'/g, "''") + "' AND is_landfall = 1",
          outFields: '*', returnGeometry: 'false',
          orderByFields: 'datetime ASC'
        });
        fetch(POINTS_URL + '/query?' + lfParams).then(function(r) { return r.json(); }).then(function(result) {
          var extrasDiv = document.getElementById("stormExtras");
          var features = result.features || [];
          if (!extrasDiv || features.length === 0) return;

          var html = '<div class="landfall-section"><div class="section-label">Landfalls (' + features.length + ')</div>';
          features.forEach(function(f) {
            var la = f.attributes;
            var lfCatNum = la.category_num != null ? String(la.category_num) : "-1";
            var lfColor = CAT_COLORS_HEX[lfCatNum] || "#78909c";
            var lfCat = la.category || "Unknown";
            var lfWind = la.wind_kt ? la.wind_kt + " kt" : "";
            var lfPres = (la.pressure_mb && la.pressure_mb > 0) ? la.pressure_mb + " mb" : "";
            var lfDate = formatDateTime(la.datetime);
            var lfState = la.landfall_state || "";
            var lfLoc = lfState || (la.latitude.toFixed(1) + "°, " + la.longitude.toFixed(1) + "°");

            html +=
              '<div class="landfall-card">' +
                '<div class="lf-header">' +
                  '<span class="lf-location">' + lfLoc + '</span>' +
                  '<span class="lf-cat" style="background:' + lfColor + ';">' + lfCat + '</span>' +
                '</div>' +
                '<div class="lf-details">' +
                  '<span>' + lfDate + '</span>' +
                  (lfWind ? '<span>' + lfWind + '</span>' : '') +
                  (lfPres ? '<span>' + lfPres + '</span>' : '') +
                '</div>' +
              '</div>';
          });
          html += '</div>';
          extrasDiv.innerHTML += html;
        }).catch(function(err) {
          console.error("Error loading landfalls:", err);
        });
      }

      // Stored features for looping
      var playbackFeatures = null;

      function playStorm(storm) {
        playbackActive = true;
        playbackPaused = false;
        playbackIdx = 0;
        playBtn.disabled = true;
        stopBtn.style.display = "block";
        transportControls.classList.add("visible");
        pauseBtn.innerHTML = "&#9208;";
        pauseBtn.title = "Pause";
        stepBackBtn.disabled = true;
        stepFwdBtn.disabled = true;

        void(0); // bannerName = storm.name;
        void(0); // bannerDetail = storm.year + " Atlantic Season — Peak: " + storm.peak_category;
        void(0); // bannerProgress = "Loading track segments...";
        void(0); // playbackBanner = "block";

        // Collapse filter controls
        document.getElementById("controlsCollapsible").classList.add("collapsed");

        // HIDE other storms completely
        segmentsLayer.visible = false;
        landfallLayer.visible = false;

        animationLayer.removeAll();

        var query = segmentsLayer.createQuery();
        query.where = "storm_id = '" + storm.storm_id.replace(/'/g, "''") + "'";
        query.outFields = ["*"];
        query.orderByFields = ["segment_num ASC"];
        query.returnGeometry = true;

        segmentsLayer.queryFeatures(query).then(function(result) {
          playbackFeatures = result.features;
          if (playbackFeatures.length === 0) {
            void(0); // bannerProgress = "No track segments found";
            setTimeout(stopPlayback, 2000);
            return;
          }

          // Zoom closer to storm extent
          var extent = null;
          playbackFeatures.forEach(function(f) {
            if (f.geometry && f.geometry.extent) {
              extent = extent ? extent.union(f.geometry.extent) : f.geometry.extent.clone();
            }
          });
          if (extent) {
            if (is3D && playbackFeatures[0].geometry && playbackFeatures[0].geometry.paths) {
              // In 3D, rotate globe to storm origin
              var startPt = playbackFeatures[0].geometry.paths[0][0];
              var cam = view.camera.clone();
              cam.position.longitude = startPt[0];
              cam.position.latitude = startPt[1] - 15;
              view.goTo({ target: cam }, { duration: 1500 }).catch(function() {});
            } else {
              view.goTo({ target: extent }, { duration: 1200 }).catch(function() {});
            }
          }

          // Show info panel with first segment
          showInfoPanel(playbackFeatures[0].attributes);

          drawLoop(0);
        }).catch(function(err) {
          console.error("Error querying storm segments:", err);
          void(0); // bannerProgress = "Error loading segments";
          setTimeout(stopPlayback, 2000);
        });
      }

      function drawLoop(idx) {
        if (!playbackActive || !playbackFeatures) return;
        if (playbackPaused) return;

        // Loop: reset when reaching end
        if (idx >= playbackFeatures.length) {
          animationLayer.removeAll();
          playbackIdx = 0;
          void(0); // bannerProgress = "Looping...";
          playbackTimeout = setTimeout(function() { drawLoop(0); }, 800);
          return;
        }

        playbackIdx = idx;

        var f = playbackFeatures[idx];
        var catNum = f.attributes.category_num != null ? String(f.attributes.category_num) : "-1";
        var color = CAT_COLORS_RGB[catNum] || CAT_COLORS_RGB["-1"];
        var width = CAT_WIDTHS[catNum] || 0.75;

        // Glow
        animationLayer.add(new Graphic({
          geometry: f.geometry,
          symbol: { type: "simple-line", color: [...color, 50], width: width + 5, cap: "round", join: "round" }
        }));
        // Main line
        animationLayer.add(new Graphic({
          geometry: f.geometry,
          symbol: { type: "simple-line", color: [...color, 240], width: width + 0.5, cap: "round", join: "round" },
          attributes: f.attributes
        }));

        // Update info panel with current segment
        showInfoPanel(f.attributes);

        // Globe follow — smoothly rotate to keep storm centered
        if (is3D && f.geometry && f.geometry.paths && f.geometry.paths[0]) {
          var path = f.geometry.paths[0];
          var endPt = path[path.length - 1];
          if (endPt && idx % 2 === 0) {
            var cam = view.camera.clone();
            cam.position.longitude = endPt[0];
            cam.position.latitude = endPt[1];
            view.goTo({ target: cam }, { duration: 1000, easing: "ease-in-out" }).catch(function() {});
          }
        }

        var delay = Math.max(40, 600 - (animationSpeed * 112));
        playbackTimeout = setTimeout(function() { drawLoop(idx + 1); }, delay);
      }

      function updateBannerForIdx(idx) {
        if (!playbackFeatures || idx < 0 || idx >= playbackFeatures.length) return;
        var f = playbackFeatures[idx];
        var catNum = f.attributes.category_num != null ? String(f.attributes.category_num) : "-1";
        var catLabel = CAT_LABELS[catNum] || "Unknown";
        var windInfo = f.attributes.wind_kt ? f.attributes.wind_kt + " kt" : "";
        void(0); // bannerProgress = "Segment " + (idx + 1) + " of " + playbackFeatures.length + " — " + catLabel + (windInfo ? " (" + windInfo + ")" : "") + "  PAUSED";
      }

      function stopPlayback() {
        playbackActive = false;
        playbackPaused = false;
        playbackIdx = 0;
        playbackFeatures = null;
        lastLoadedExtrasId = null;
        if (playbackTimeout) {
          clearTimeout(playbackTimeout);
          playbackTimeout = null;
        }
        animationLayer.removeAll();
        void(0); // playbackBanner = "none";
        stopBtn.style.display = "none";
        transportControls.classList.remove("visible");
        playBtn.disabled = !selectedStorm;
        if (selectedStorm) {
          playBtn.textContent = "Play " + selectedStorm.name + " (" + selectedStorm.year + ")";
        }
        // Expand filter controls
        document.getElementById("controlsCollapsible").classList.remove("collapsed");
        // Restore layers
        segmentsLayer.visible = true;
        landfallLayer.visible = true;
        segmentsLayer.opacity = document.getElementById("animToggle").checked ? 0.3 : 1.0;
        landfallLayer.opacity = 1.0;
        closeInfoPanel();
      }

      // Click segment → highlight full path + show info panel
      function bindClickHandler() {
        view.on("click", handleMapClick);
      }
      function handleMapClick(event) {
        if (playbackActive) return;
        view.hitTest(event).then(function(response) {
          var hit = response.results.find(function(r) {
            return r.graphic && (r.graphic.layer === segmentsLayer || r.graphic.layer === animationLayer);
          });
          if (!hit) {
            animationLayer.removeAll();
            segmentsLayer.visible = true;
            segmentsLayer.opacity = document.getElementById("animToggle").checked ? 0.3 : 1.0;
            closeInfoPanel();
            return;
          }
          var attrs = hit.graphic.attributes;
          if (!attrs || !attrs.storm_id) return;

          // Show info panel for clicked segment
          showInfoPanel(attrs);

          // Auto-populate playback player
          selectedStorm = {
            storm_id: attrs.storm_id,
            name: attrs.name || "UNNAMED",
            year: attrs.year,
            peak_category: attrs.peak_category || attrs.category || "TD",
            peak_category_num: attrs.peak_category_num != null ? attrs.peak_category_num : attrs.category_num
          };
          playBtn.disabled = false;
          playBtn.textContent = "Play " + selectedStorm.name + " (" + selectedStorm.year + ")";
          searchInput.value = selectedStorm.name;

          // Highlight full path
          var query = segmentsLayer.createQuery();
          query.where = "storm_id = '" + attrs.storm_id.replace(/'/g, "''") + "'";
          query.outFields = ["*"];
          query.orderByFields = ["segment_num ASC"];
          query.returnGeometry = true;

          segmentsLayer.queryFeatures(query).then(function(result) {
            animationLayer.removeAll();
            segmentsLayer.visible = false;

            result.features.forEach(function(f) {
              var catNum = f.attributes.category_num != null ? String(f.attributes.category_num) : "-1";
              var color = CAT_COLORS_RGB[catNum] || CAT_COLORS_RGB["-1"];
              var width = CAT_WIDTHS[catNum] || 0.75;

              animationLayer.add(new Graphic({
                geometry: f.geometry,
                symbol: { type: "simple-line", color: [...color, 60], width: width + 5, cap: "round", join: "round" }
              }));
              animationLayer.add(new Graphic({
                geometry: f.geometry,
                symbol: { type: "simple-line", color: [...color, 255], width: width + 1, cap: "round", join: "round" },
                attributes: f.attributes
              }));
            });

            // Zoom to this storm
            var extent = null;
            result.features.forEach(function(f) {
              if (f.geometry && f.geometry.extent) {
                extent = extent ? extent.union(f.geometry.extent) : f.geometry.extent.clone();
              }
            });
            if (extent) {
              view.goTo({ target: extent }, { duration: 1000 }).catch(function() {});
            }
          });
        });
      }
      bindClickHandler();

      // view.when may not resolve if a layer has issues — use whenLayerView as fallback
      // Load 4 featured storms into search results on startup
      function loadFeaturedStorms() {
        var featured = [
          { storm_id: "AL122005", name: "KATRINA", year: 2005, category: "Cat 5", category_num: 5 },
          { storm_id: "AL142024", name: "MILTON", year: 2024, category: "Cat 5", category_num: 5 },
          { storm_id: "AL092017", name: "HARVEY", year: 2017, category: "Cat 4", category_num: 4 },
          { storm_id: "AL182012", name: "SANDY", year: 2012, category: "Cat 3", category_num: 3 }
        ];

        searchResults.innerHTML = '<div style="padding:4px 10px 2px 10px;font-size:10px;color:#4fc3f7;text-transform:uppercase;letter-spacing:0.5px;">Featured Storms</div>';
        featured.forEach(function(a) {
          var catColor = CAT_COLORS_HEX[a.category_num] || "#78909c";
          var item = document.createElement("div");
          item.className = "search-result-item";
          item.innerHTML =
            '<span>' + a.name + ' (' + a.year + ')</span>' +
            '<span class="storm-cat" style="background:' + catColor + ';color:#fff;">' + a.category + '</span>';
          item.addEventListener("click", function() {
            if (playbackActive) { stopPlayback(); } else {
              animationLayer.removeAll();
              segmentsLayer.visible = true;
              segmentsLayer.opacity = document.getElementById("animToggle").checked ? 0.3 : 1.0;
              lastLoadedExtrasId = null;
            }
            var prev = searchResults.querySelector(".selected");
            if (prev) prev.classList.remove("selected");

        document.getElementById("intelOverlay").classList.remove("open");
      });
