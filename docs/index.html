      function loadTool(name) {
        toolContent.innerHTML = '<div class="tools-content" style="color:#888;font-size:12px;">Loading...</div>';
        if (name === "records") loadRecords();
        else if (name === "season") loadSeasonTool();
        else if (name === "landfalls") loadLandfallStats();
        else if (name === "monthly") loadMonthlyChart();
        else if (name === "decades") loadDecadeTrends();
        else if (name === "finder") loadFinder();
        else if (name === "compare") loadCompare();
      }

      function loadRecords() {
        var url = SUMMARY_URL + '/query?' + new URLSearchParams({
          f: 'json', where: '1=1', outFields: 'storm_id,name,year,category,category_num,max_wind_kt,max_wind_mph,min_pressure_mb,duration_hours,landfalls,is_retired',
          returnGeometry: 'false', orderByFields: 'max_wind_kt DESC', resultRecordCount: '2000'
        });
        fetch(url).then(function(r) { return r.json(); }).then(function(result) {
          var storms = result.features.map(function(f) { return f.attributes; });
          var strongest = storms[0];
          var lowestPres = storms.filter(function(s) { return s.min_pressure_mb && s.min_pressure_mb > 0; })
            .sort(function(a,b) { return a.min_pressure_mb - b.min_pressure_mb; })[0];
          var longest = storms.slice().sort(function(a,b) { return b.duration_hours - a.duration_hours; })[0];
          var mostLandfalls = storms.slice().sort(function(a,b) { return b.landfalls - a.landfalls; })[0];
          var cat5s = storms.filter(function(s) { return s.category_num === 5; });
          var retiredCount = storms.filter(function(s) { return s.is_retired === 1; }).length;
          var hurricaneCount = storms.filter(function(s) { return s.category_num >= 1; }).length;
          var majorCount = storms.filter(function(s) { return s.category_num >= 3; }).length;

          function card(icon, bg, label, name, year, detail, stat, unit, sid) {
            return '<div class="record-card" ' + (sid ? 'data-sid="' + sid + '"' : '') + '>' +
              '<div class="rc-icon" style="background:' + bg + ';">' + icon + '</div>' +
              '<div class="rc-info"><div class="rc-label">' + label + '</div>' +
              '<div class="rc-value">' + name + (year ? ' (' + year + ')' : '') + '</div>' +
              '<div class="rc-detail">' + detail + '</div></div>' +
              '<div class="rc-stat"><div class="rc-stat-num" style="color:' + bg + ';">' + stat + '</div>' +
              '<div class="rc-stat-unit">' + unit + '</div></div></div>';
          }

          var html = '';
          html += card('💨', '#ef5350', 'Strongest Wind', strongest.name, strongest.year,
            strongest.category + ' · ' + strongest.max_wind_mph + ' mph',
            strongest.max_wind_kt, 'knots', strongest.storm_id);

          html += card('🌀', '#7b1fa2', 'Lowest Pressure', lowestPres.name, lowestPres.year,
            lowestPres.category,
            lowestPres.min_pressure_mb, 'mb', lowestPres.storm_id);

          html += card('⏱', '#1565C0', 'Longest Duration', longest.name, longest.year,
            longest.category + ' · ' + longest.duration_hours + ' hours',
            (longest.duration_hours / 24).toFixed(0), 'days', longest.storm_id);

          html += card('🎯', '#FFD700', 'Most Landfalls', mostLandfalls.name, mostLandfalls.year,
            mostLandfalls.category,
            mostLandfalls.landfalls, 'hits', mostLandfalls.storm_id);

          // Summary grid
          html += '<div class="records-grid">' +
            '<div class="rg-card"><div class="rg-num">' + storms.length.toLocaleString() + '</div><div class="rg-label">Total Storms</div></div>' +
            '<div class="rg-card"><div class="rg-num">' + hurricaneCount.toLocaleString() + '</div><div class="rg-label">Hurricanes</div></div>' +
            '<div class="rg-card"><div class="rg-num">' + majorCount + '</div><div class="rg-label">Major (Cat 3+)</div></div>' +
            '<div class="rg-card"><div class="rg-num" style="color:#7f0000;">' + cat5s.length + '</div><div class="rg-label">Category 5</div></div>' +
            '<div class="rg-card"><div class="rg-num" style="color:#ef5350;">' + retiredCount + '</div><div class="rg-label">Retired Names</div></div>' +
            '<div class="rg-card"><div class="rg-num">174</div><div class="rg-label">Years of Data</div></div>' +
          '</div>';

          // Cat 5 list — compact 3-column table, sorted by year desc
          cat5s.sort(function(a,b) { return b.year - a.year; });
          html += '<div style="margin-top:16px;"><div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px;">Category 5 Storms (' + cat5s.length + ')</div>';
          html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;">';
          cat5s.slice(0, 18).forEach(function(s) {
            html += '<div style="padding:5px 8px;font-size:11px;color:#ef9a9a;cursor:pointer;border-radius:4px;transition:background 0.15s;" data-sid="' + s.storm_id + '" onmouseover="this.style.background=\'rgba(127,0,0,0.2)\'" onmouseout="this.style.background=\'none\'">' + s.name + ' <span style="color:#888;">' + s.year + '</span></div>';
          });
          if (cat5s.length > 18) {
            html += '<div style="padding:5px 8px;font-size:11px;color:#666;">+' + (cat5s.length - 18) + ' more</div>';
          }
          html += '</div></div>';

          toolContent.innerHTML = html;

          // Click to play
          toolContent.querySelectorAll('[data-sid]').forEach(function(el) {
            el.addEventListener('click', function() {
              var sid = el.getAttribute('data-sid');
              var s = storms.find(function(st) { return st.storm_id === sid; });
              if (s) {
                selectedStorm = { storm_id: s.storm_id, name: s.name, year: s.year, peak_category: s.category, peak_category_num: s.category_num };
                playBtn.disabled = false;
                playBtn.textContent = "Play " + s.name + " (" + s.year + ")";
                searchInput.value = s.name;
                document.getElementById("intelOverlay").classList.remove("open");
              }
            });
          });
        });
      }

      function loadSeasonTool() {
        var html = '<div class="tools-content">' +
          '<div class="season-input"><input type="number" id="seasonYear" value="2024" min="1851" max="2025" />' +
          '<button style="background:#4fc3f7;color:#1a1a2e;border:none;border-radius:6px;padding:6px 14px;font-weight:700;font-size:12px;cursor:pointer;">GO</button></div>' +
          '<div id="seasonResults"></div></div>';
        toolContent.innerHTML = html;

        function querySeason(yr) {
          var url = SUMMARY_URL + '/query?' + new URLSearchParams({
            f: 'json', where: 'year = ' + yr,
            outFields: 'storm_id,name,year,category,category_num,max_wind_kt,start_date,end_date,landfalls,is_retired',
            returnGeometry: 'false', orderByFields: 'start_date ASC'
          });
          fetch(url).then(function(r) { return r.json(); }).then(function(result) {
            var storms = result.features.map(function(f) { return f.attributes; });
            var el = document.getElementById("seasonResults");
            if (storms.length === 0) { el.innerHTML = '<div style="color:#888;font-size:12px;">No storms found for ' + yr + '</div>'; return; }

            var hurricanes = storms.filter(function(s) { return s.category_num >= 1; }).length;
            var majors = storms.filter(function(s) { return s.category_num >= 3; }).length;

            var h = '<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;">' + yr + ' Atlantic Season</div>';
            h += '<div style="font-size:11px;color:#888;margin-bottom:10px;">' + storms.length + ' storms · ' + hurricanes + ' hurricanes · ' + majors + ' major</div>';

            storms.forEach(function(s) {
              var catColor = CAT_COLORS_HEX[s.category_num] || "#78909c";
              var retired = s.is_retired === 1 ? ' <span style="font-size:9px;color:#ef5350;">RETIRED</span>' : '';
              h += '<div class="season-storm-row" data-sid="' + s.storm_id + '">' +
                '<div><span class="season-storm-name">' + s.name + retired + '</span><br/>' +
                '<span class="season-storm-dates">' + formatDate(s.start_date) + ' — ' + formatDate(s.end_date) + '</span></div>' +
                '<span class="storm-cat" style="background:' + catColor + ';color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;">' + s.category + '</span></div>';
            });
            el.innerHTML = h;

            el.querySelectorAll('.season-storm-row').forEach(function(row) {
              row.addEventListener('click', function() {
                var sid = row.getAttribute('data-sid');
                var s = storms.find(function(st) { return st.storm_id === sid; });
                if (s) {
                  selectedStorm = { storm_id: s.storm_id, name: s.name, year: s.year, peak_category: s.category, peak_category_num: s.category_num };
                  playBtn.disabled = false;
                  playBtn.textContent = "Play " + s.name + " (" + s.year + ")";
                  searchInput.value = s.name;
                  document.getElementById("intelOverlay").classList.remove("open");
                }
              });
            });
          });
        }

        document.getElementById("seasonYear").parentElement.querySelector("button").addEventListener("click", function() {
          querySeason(parseInt(document.getElementById("seasonYear").value));
        });
        querySeason(2024);
      }

      function loadLandfallStats() {
        var url = POINTS_URL + '/query?' + new URLSearchParams({
          f: 'json', where: "is_landfall = 1 AND landfall_state <> ''",
          outFields: 'landfall_state', returnGeometry: 'false', resultRecordCount: '2000'
        });
        fetch(url).then(function(r) { return r.json(); }).then(function(result) {
          var counts = {};
          result.features.forEach(function(f) {
            var st = f.attributes.landfall_state;
            if (st) counts[st] = (counts[st] || 0) + 1;
          });
          var sorted = Object.entries(counts).sort(function(a,b) { return b[1] - a[1]; });
          var max = sorted[0] ? sorted[0][1] : 1;

          var html = '<div class="tools-content">';
          html += '<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;">Landfall Locations</div>';
          html += '<div style="font-size:11px;color:#888;margin-bottom:12px;">All-time landfall counts by state/country</div>';

          sorted.slice(0, 20).forEach(function(entry) {
            var pct = Math.round((entry[1] / max) * 100);
            html += '<div class="lf-stat-bar">' +
              '<span class="lf-stat-label">' + entry[0] + '</span>' +
              '<div class="lf-stat-track"><div class="lf-stat-fill" style="width:' + pct + '%;"></div></div>' +
              '<span class="lf-stat-count">' + entry[1] + '</span></div>';
          });
          html += '</div>';
          toolContent.innerHTML = html;
        });
      }

      function loadMonthlyChart() {
        var minCat = parseInt(document.getElementById("catFilter").value);
        var yearStart = parseInt(document.getElementById("yearStart").value);
        var yearEnd = parseInt(document.getElementById("yearEnd").value);
        var url = SUMMARY_URL + '/query?' + new URLSearchParams({
          f: 'json', where: 'category_num >= ' + minCat + ' AND year >= ' + yearStart + ' AND year <= ' + yearEnd,
          outFields: 'month', returnGeometry: 'false', resultRecordCount: '5000'
        });
        fetch(url).then(function(r) { return r.json(); }).then(function(result) {
          var counts = {}; for (var i = 1; i <= 12; i++) counts[i] = 0;
          result.features.forEach(function(f) { var m = f.attributes.month; if (m >= 1 && m <= 12) counts[m]++; });
          var maxCount = Math.max.apply(null, Object.values(counts)) || 1;
          var total = result.features.length;
          var MONTH_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

          var html = '';
          html += '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;">Monthly Distribution</div>';
          html += '<div style="font-size:12px;color:#888;margin-bottom:20px;">' + total + ' storms by formation month</div>';

          // Only show months with activity (Jun-Nov typically), but include all
          for (var m = 1; m <= 12; m++) {
            var pct = Math.round((counts[m] / maxCount) * 100);
            var isHurr = (m >= 6 && m <= 11);
            var barColor = isHurr ? "#4fc3f7" : "rgba(255,255,255,0.2)";
            var countPct = total > 0 ? Math.round((counts[m] / total) * 100) : 0;
            html += '<div style="display:flex;align-items:center;margin-bottom:8px;">' +
              '<span style="width:90px;font-size:13px;color:' + (counts[m] > 0 ? '#e0e0e0' : '#555') + ';text-align:right;margin-right:12px;font-weight:' + (counts[m] > 0 ? '600' : '400') + ';">' + MONTH_FULL[m-1] + '</span>' +
              '<div style="flex:1;height:28px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;position:relative;">' +
                '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:4px;transition:width 0.4s;"></div>' +
                (counts[m] > 0 ? '<span style="position:absolute;top:5px;left:' + Math.max(pct + 1, 8) + '%;font-size:13px;font-weight:700;color:#fff;">' + counts[m] + ' <span style="font-weight:400;font-size:11px;color:#aaa;">(' + countPct + '%)</span></span>' : '') +
              '</div></div>';
          }

          // Peak season callout
          var peakMonth = 1; var peakCount = 0;
          for (var m2 = 1; m2 <= 12; m2++) { if (counts[m2] > peakCount) { peakCount = counts[m2]; peakMonth = m2; } }
          html += '<div style="margin-top:16px;padding:12px 16px;background:rgba(79,195,247,0.08);border:1px solid rgba(79,195,247,0.2);border-radius:8px;">' +
            '<span style="font-size:12px;color:#4fc3f7;font-weight:700;">PEAK: ' + MONTH_FULL[peakMonth-1] + '</span>' +
            '<span style="font-size:12px;color:#888;margin-left:8px;">' + peakCount + ' storms (' + Math.round((peakCount/total)*100) + '% of all activity)</span></div>';

          toolContent.innerHTML = html;
        });
      }

      function loadDecadeTrends() {
        var url = SUMMARY_URL + '/query?' + new URLSearchParams({
          f: 'json', where: '1=1', outFields: 'year,category_num', returnGeometry: 'false', resultRecordCount: '5000'
        });
        fetch(url).then(function(r) { return r.json(); }).then(function(result) {
          var decades = {};
          result.features.forEach(function(f) {
            var a = f.attributes;
            var dec = Math.floor(a.year / 10) * 10;
            if (!decades[dec]) decades[dec] = { total: 0, hurricanes: 0, major: 0 };
            decades[dec].total++;
            if (a.category_num >= 1) decades[dec].hurricanes++;
            if (a.category_num >= 3) decades[dec].major++;
          });

          var sorted = Object.keys(decades).sort().reverse(); // newest first
          var maxTotal = Math.max.apply(null, sorted.map(function(d) { return decades[d].total; }));

          var html = '';
          html += '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;">Decade Trends</div>';
          html += '<div style="font-size:13px;color:#888;margin-bottom:16px;">Storm counts by decade — newest first</div>';

          // Legend
          html += '<div style="display:flex;gap:20px;margin-bottom:14px;font-size:13px;">' +
            '<span><span style="display:inline-block;width:12px;height:12px;background:rgba(79,195,247,0.4);border-radius:2px;margin-right:5px;vertical-align:middle;"></span><span style="color:#4fc3f7;">All Storms</span></span>' +
            '<span><span style="display:inline-block;width:12px;height:12px;background:rgba(230,81,0,0.6);border-radius:2px;margin-right:5px;vertical-align:middle;"></span><span style="color:#e65100;">Hurricanes</span></span>' +
            '<span><span style="display:inline-block;width:12px;height:12px;background:rgba(183,28,28,0.8);border-radius:2px;margin-right:5px;vertical-align:middle;"></span><span style="color:#b71c1c;">Major (3+)</span></span>' +
          '</div>';

          sorted.forEach(function(dec) {
            var d = decades[dec];
            var totalW = Math.round((d.total / maxTotal) * 100);
            var hurrW = Math.round((d.hurricanes / maxTotal) * 100);
            var majorW = Math.round((d.major / maxTotal) * 100);
            html += '<div style="margin-bottom:12px;">' +
              '<div style="display:flex;align-items:baseline;margin-bottom:4px;">' +
                '<span style="font-size:15px;font-weight:700;color:#e0e0e0;width:70px;">' + dec + 's</span>' +
                '<span style="font-size:14px;color:#4fc3f7;font-weight:600;width:60px;text-align:right;">' + d.total + '</span>' +
                '<span style="font-size:14px;color:#e65100;font-weight:600;width:60px;text-align:right;">' + d.hurricanes + '</span>' +
                '<span style="font-size:14px;color:#b71c1c;font-weight:600;width:60px;text-align:right;">' + d.major + '</span>' +
              '</div>' +
              '<div style="display:flex;flex-direction:column;gap:3px;">' +
                '<div style="height:10px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;"><div style="width:' + totalW + '%;height:100%;background:rgba(79,195,247,0.4);border-radius:3px;"></div></div>' +
                '<div style="height:10px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;"><div style="width:' + hurrW + '%;height:100%;background:rgba(230,81,0,0.6);border-radius:3px;"></div></div>' +
                '<div style="height:10px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;"><div style="width:' + majorW + '%;height:100%;background:rgba(183,28,28,0.8);border-radius:3px;"></div></div>' +
              '</div>' +
            '</div>';
          });
          html += '</div>';
          toolContent.innerHTML = html;
        });
      }

      function loadCompare() {
        var compareStorms = [];

        var html = '';
        html += '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;">Storm Compare</div>';
        html += '<div style="font-size:13px;color:#888;margin-bottom:16px;">Add up to 4 storms to compare side-by-side and overlay on the map</div>';

        html += '<div style="display:flex;gap:10px;margin-bottom:16px;">';
        html += '<input type="text" id="compareSearch" placeholder="Search storm name..." style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:8px 12px;font-size:14px;outline:none;" />';
        html += '</div>';
        html += '<div id="compareSearchResults" style="max-height:160px;overflow-y:auto;margin-bottom:16px;"></div>';
        html += '<div id="compareSelected" style="margin-bottom:16px;"></div>';
        html += '<div id="compareTable"></div>';
        html += '<div style="margin-top:16px;"><button id="compareShowMap" style="background:#4fc3f7;color:#1a1a2e;border:none;border-radius:6px;padding:10px 28px;font-weight:700;font-size:14px;cursor:pointer;display:none;">SHOW ON MAP</button></div>';

        toolContent.innerHTML = html;

        var compareSearchInput = document.getElementById("compareSearch");
        var compareSearchResults = document.getElementById("compareSearchResults");
        var compareSelectedDiv = document.getElementById("compareSelected");
        var compareTableDiv = document.getElementById("compareTable");
        var compareShowMapBtn = document.getElementById("compareShowMap");
        var compareColors = ["#4fc3f7", "#FFD700", "#ef5350", "#66bb6a"];

        var debounce = null;
        compareSearchInput.addEventListener("input", function() {
          var val = compareSearchInput.value.trim();
          if (debounce) clearTimeout(debounce);
          if (val.length < 2) { compareSearchResults.innerHTML = ""; return; }
          debounce = setTimeout(function() {
            var url = SUMMARY_URL + '/query?' + new URLSearchParams({
              f: 'json', where: "UPPER(name) LIKE '%" + val.toUpperCase().replace(/'/g, "''") + "%'",
              outFields: 'storm_id,name,year,category,category_num,max_wind_kt,max_wind_mph,min_pressure_mb,duration_hours,landfalls,is_retired',
              returnGeometry: 'false', orderByFields: 'year DESC', resultRecordCount: '20'
            });
            fetch(url).then(function(r) { return r.json(); }).then(function(result) {
              var h = '';
              (result.features || []).forEach(function(f) {
                var a = f.attributes;
                var catColor = CAT_COLORS_HEX[a.category_num] || "#78909c";
                var already = compareStorms.find(function(s) { return s.storm_id === a.storm_id; });
                h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;cursor:pointer;border-radius:4px;transition:background 0.15s;' + (already ? 'opacity:0.4;' : '') + '" onmouseover="this.style.background=\'rgba(255,255,255,0.06)\'" onmouseout="this.style.background=\'none\'" data-csid="' + a.storm_id + '">' +
                  '<span style="font-size:14px;color:#e0e0e0;">' + a.name + ' (' + a.year + ')</span>' +
                  '<span style="padding:3px 10px;border-radius:8px;background:' + catColor + ';color:#fff;font-size:12px;font-weight:700;">' + a.category + '</span></div>';
              });
              compareSearchResults.innerHTML = h;

              compareSearchResults.querySelectorAll('[data-csid]').forEach(function(el) {
                el.addEventListener('click', function() {
                  if (compareStorms.length >= 4) return;
                  var sid = el.getAttribute('data-csid');
                  if (compareStorms.find(function(s) { return s.storm_id === sid; })) return;
                  var f = (result.features || []).find(function(f2) { return f2.attributes.storm_id === sid; });
                  if (f) {
                    compareStorms.push(f.attributes);
                    compareSearchInput.value = "";
                    compareSearchResults.innerHTML = "";
                    renderCompare();
                  }
                });
              });
            });
          }, 300);
        });

        function renderCompare() {
          // Selected tags
          var tags = '';
          compareStorms.forEach(function(s, i) {
            var col = compareColors[i % compareColors.length];
            tags += '<span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,0.05);border:1px solid ' + col + ';border-radius:6px;margin-right:8px;margin-bottom:6px;">' +
              '<span style="width:10px;height:10px;border-radius:50%;background:' + col + ';"></span>' +
              '<span style="font-size:14px;font-weight:600;color:#e0e0e0;">' + s.name + ' (' + s.year + ')</span>' +
              '<span style="cursor:pointer;color:#888;font-size:16px;margin-left:4px;" data-remove="' + i + '">&times;</span></span>';
          });
          compareSelectedDiv.innerHTML = tags;

          // Remove handlers
          compareSelectedDiv.querySelectorAll('[data-remove]').forEach(function(el) {
            el.addEventListener('click', function() {
              compareStorms.splice(parseInt(el.getAttribute('data-remove')), 1);
              renderCompare();
            });
          });

          // Comparison table
          if (compareStorms.length < 2) {
            compareTableDiv.innerHTML = '<div style="color:#666;font-size:14px;">Add at least 2 storms to compare</div>';
            compareShowMapBtn.style.display = 'none';
            return;
          }

          compareShowMapBtn.style.display = 'inline-block';

          var rows = [
            { label: 'Category', key: 'category', format: function(s) { return '<span style="padding:3px 10px;border-radius:8px;background:' + (CAT_COLORS_HEX[s.category_num]||"#78909c") + ';color:#fff;font-size:12px;font-weight:700;">' + s.category + '</span>'; } },
            { label: 'Max Wind', key: 'max_wind_mph', format: function(s) { return '<strong>' + (s.max_wind_mph||'—') + '</strong> mph / ' + (s.max_wind_kt||'—') + ' kt'; } },
            { label: 'Min Pressure', key: 'min_pressure_mb', format: function(s) { return '<strong>' + (s.min_pressure_mb||'—') + '</strong> mb'; } },
            { label: 'Duration', key: 'duration_hours', format: function(s) { return '<strong>' + (s.duration_hours ? (s.duration_hours/24).toFixed(1) : '—') + '</strong> days'; } },
            { label: 'Landfalls', key: 'landfalls', format: function(s) { return '<strong>' + (s.landfalls||0) + '</strong>'; } },
            { label: 'Retired', key: 'is_retired', format: function(s) { return s.is_retired === 1 ? '<span style="color:#ef5350;font-weight:700;">Yes</span>' : 'No'; } }
          ];

          var t = '<table style="width:100%;border-collapse:collapse;">';
          // Header row
          t += '<tr style="border-bottom:1px solid rgba(255,255,255,0.1);"><th style="padding:10px 12px;"></th>';
          compareStorms.forEach(function(s, i) {
            var col = compareColors[i % compareColors.length];
            t += '<th style="padding:10px 12px;text-align:center;font-size:15px;font-weight:700;color:' + col + ';">' + s.name + '<br/><span style="font-size:12px;font-weight:400;color:#888;">' + s.year + '</span></th>';
          });
          t += '</tr>';

          rows.forEach(function(row) {
            t += '<tr style="border-bottom:1px solid rgba(255,255,255,0.04);">';
            t += '<td style="padding:10px 12px;font-size:13px;color:#888;font-weight:600;text-transform:uppercase;">' + row.label + '</td>';
            // Find best value for highlighting
            var vals = compareStorms.map(function(s) { return s[row.key]; });
            compareStorms.forEach(function(s, i) {
              var isBest = false;
              if (row.key === 'min_pressure_mb' && s[row.key] && s[row.key] === Math.min.apply(null, vals.filter(function(v) { return v && v > 0; }))) isBest = true;
              else if (row.key !== 'min_pressure_mb' && row.key !== 'is_retired' && s[row.key] === Math.max.apply(null, vals)) isBest = true;
              t += '<td style="padding:10px 12px;text-align:center;font-size:14px;color:#e0e0e0;' + (isBest ? 'background:rgba(79,195,247,0.08);' : '') + '">' + row.format(s) + '</td>';
            });
            t += '</tr>';
          });
          t += '</table>';
          compareTableDiv.innerHTML = t;
        }

        // Show on map button
        compareShowMapBtn.addEventListener('click', function() {
          document.getElementById("intelOverlay").classList.remove("open");

          // Stop any active playback
          if (playbackActive) stopPlayback();
          animationLayer.removeAll();
          segmentsLayer.visible = false;
          landfallLayer.visible = false;

          // Query and draw each storm's track in its compare color
          var allExtents = null;
          var loaded = 0;

          compareStorms.forEach(function(s, i) {
            var col = compareColors[i % compareColors.length];
            var rgb = hexToRgb(col);
            var query = segmentsLayer.createQuery();
            query.where = "storm_id = '" + s.storm_id.replace(/'/g, "''") + "'";
            query.outFields = ["*"];
            query.orderByFields = ["segment_num ASC"];
            query.returnGeometry = true;

            segmentsLayer.queryFeatures(query).then(function(result) {
              result.features.forEach(function(f) {
                // Glow
                animationLayer.add(new Graphic({
                  geometry: f.geometry,
                  symbol: { type: "simple-line", color: [...rgb, 40], width: 8, cap: "round", join: "round" }
                }));
                // Main line
                animationLayer.add(new Graphic({
                  geometry: f.geometry,
                  symbol: { type: "simple-line", color: [...rgb, 220], width: 3, cap: "round", join: "round" },
                  attributes: f.attributes
                }));
                if (f.geometry && f.geometry.extent) {
                  allExtents = allExtents ? allExtents.union(f.geometry.extent) : f.geometry.extent.clone();
                }
              });

              loaded++;
              if (loaded === compareStorms.length && allExtents) {
                view.goTo({ target: allExtents }, { duration: 1200 }).catch(function() {});
              }
            });
          });
        });

        // Hex to RGB helper
        function hexToRgb(hex) {
          hex = hex.replace('#', '');
          return [parseInt(hex.substr(0,2),16), parseInt(hex.substr(2,2),16), parseInt(hex.substr(4,2),16)];
        }

        renderCompare();
      }

      function loadFinder() {
        var states = ["Florida","Texas","Louisiana","North Carolina","South Carolina","Mississippi","Alabama","New York","New Jersey","Georgia","Virginia","Connecticut","Massachusetts","Maine","Maryland","Cuba","Mexico","Bahamas","Puerto Rico","Honduras","Nicaragua","Belize","Jamaica","Dominican Rep.","Haiti","Bermuda","Canada"];

        var html = '';
        html += '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;">Storm Finder</div>';
        html += '<div style="font-size:13px;color:#888;margin-bottom:16px;">Find storms by category, landfall location, and year range</div>';

        html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">';

        // Category
        html += '<div style="flex:1;min-width:140px;"><label style="display:block;font-size:12px;color:#888;text-transform:uppercase;font-weight:600;margin-bottom:5px;">Min Category</label>' +
          '<select id="finderCat" style="width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:8px 10px;font-size:14px;outline:none;">' +
          '<option value="-1">All Storms</option><option value="0">Tropical Storm+</option>' +
          '<option value="1">Category 1+</option><option value="2">Category 2+</option>' +
          '<option value="3" selected>Category 3+</option><option value="4">Category 4+</option><option value="5">Category 5</option></select></div>';

        // State
        html += '<div style="flex:1;min-width:160px;"><label style="display:block;font-size:12px;color:#888;text-transform:uppercase;font-weight:600;margin-bottom:5px;">Landfall Location</label>' +
          '<select id="finderState" style="width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:8px 10px;font-size:14px;outline:none;">' +
          '<option value="">Any Location</option>';
        states.forEach(function(s) { html += '<option value="' + s + '">' + s + '</option>'; });
        html += '</select></div>';

        // Year range
        html += '<div style="flex:1;min-width:100px;"><label style="display:block;font-size:12px;color:#888;text-transform:uppercase;font-weight:600;margin-bottom:5px;">From Year</label>' +
          '<input type="number" id="finderYearFrom" value="1851" min="1851" max="2025" style="width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:8px 10px;font-size:14px;outline:none;" /></div>';
        html += '<div style="flex:1;min-width:100px;"><label style="display:block;font-size:12px;color:#888;text-transform:uppercase;font-weight:600;margin-bottom:5px;">To Year</label>' +
          '<input type="number" id="finderYearTo" value="2025" min="1851" max="2025" style="width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:8px 10px;font-size:14px;outline:none;" /></div>';

        // Search button
        html += '<div style="display:flex;align-items:end;"><button id="finderSearchBtn" style="background:#4fc3f7;color:#1a1a2e;border:none;border-radius:6px;padding:9px 24px;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;">SEARCH</button></div>';

        html += '</div>';
        html += '<div id="finderResults" style="font-size:14px;color:#888;">Select filters and click Search</div>';

        toolContent.innerHTML = html;

        document.getElementById("finderSearchBtn").addEventListener("click", runFinder);

        function runFinder() {
          var minCat = parseInt(document.getElementById("finderCat").value);
          var state = document.getElementById("finderState").value;
          var yearFrom = parseInt(document.getElementById("finderYearFrom").value);
          var yearTo = parseInt(document.getElementById("finderYearTo").value);
          var resultsDiv = document.getElementById("finderResults");
          resultsDiv.innerHTML = '<div style="color:#888;">Searching...</div>';

          if (state) {
            // Need to query track points for landfall_state, then get unique storm_ids
            var lfUrl = POINTS_URL + '/query?' + new URLSearchParams({
              f: 'json',
              where: "is_landfall = 1 AND landfall_state = '" + state.replace(/'/g, "''") + "' AND category_num >= " + minCat + " AND year >= " + yearFrom + " AND year <= " + yearTo,
              outFields: 'storm_id', returnGeometry: 'false', returnDistinctValues: 'true',
              resultRecordCount: '500'
            });
            fetch(lfUrl).then(function(r) { return r.json(); }).then(function(lfResult) {
              var stormIds = [];
              (lfResult.features || []).forEach(function(f) {
                if (stormIds.indexOf(f.attributes.storm_id) === -1) stormIds.push(f.attributes.storm_id);
              });
              if (stormIds.length === 0) {
                resultsDiv.innerHTML = '<div style="color:#888;font-size:14px;">No storms found matching those criteria.</div>';
                return;
              }
              // Now get storm details
              var idList = stormIds.map(function(id) { return "'" + id + "'"; }).join(",");
              var sUrl = SUMMARY_URL + '/query?' + new URLSearchParams({
                f: 'json', where: 'storm_id IN (' + idList + ')',
                outFields: 'storm_id,name,year,category,category_num,max_wind_kt,max_wind_mph,min_pressure_mb,landfalls,is_retired',
                returnGeometry: 'false', orderByFields: 'year DESC'
              });
              return fetch(sUrl).then(function(r2) { return r2.json(); }).then(function(sResult) {
                renderFinderResults(sResult.features || [], state, resultsDiv);
              });
            });
          } else {
            // No state filter — just query summary table
            var sUrl = SUMMARY_URL + '/query?' + new URLSearchParams({
              f: 'json',
              where: 'category_num >= ' + minCat + ' AND year >= ' + yearFrom + ' AND year <= ' + yearTo,
              outFields: 'storm_id,name,year,category,category_num,max_wind_kt,max_wind_mph,min_pressure_mb,landfalls,is_retired',
              returnGeometry: 'false', orderByFields: 'year DESC',
              resultRecordCount: '200'
            });
            fetch(sUrl).then(function(r) { return r.json(); }).then(function(result) {
              renderFinderResults(result.features || [], null, resultsDiv);
            });
          }
        }

        function renderFinderResults(features, state, container) {
          var storms = features.map(function(f) { return f.attributes; });
          if (storms.length === 0) {
            container.innerHTML = '<div style="color:#888;font-size:14px;">No storms found.</div>';
            return;
          }

          var h = '<div style="font-size:14px;font-weight:700;color:#4fc3f7;margin-bottom:12px;">' + storms.length + ' storms found' + (state ? ' hitting ' + state : '') + '</div>';

          h += '<table style="width:100%;border-collapse:collapse;">';
          h += '<tr style="border-bottom:1px solid rgba(255,255,255,0.1);">' +
            '<th style="text-align:left;padding:8px 12px;font-size:12px;color:#888;">STORM</th>' +
            '<th style="text-align:center;padding:8px 12px;font-size:12px;color:#888;">YEAR</th>' +
            '<th style="text-align:center;padding:8px 12px;font-size:12px;color:#888;">CAT</th>' +
            '<th style="text-align:right;padding:8px 12px;font-size:12px;color:#888;">WIND</th>' +
            '<th style="text-align:right;padding:8px 12px;font-size:12px;color:#888;">PRESS</th>' +
            '</tr>';

          storms.forEach(function(s) {
            var catColor = CAT_COLORS_HEX[s.category_num] || "#78909c";
            var retired = s.is_retired === 1 ? ' <span style="font-size:10px;color:#ef5350;">RET</span>' : '';
            h += '<tr style="border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s;" data-sid="' + s.storm_id + '" onmouseover="this.style.background=\'rgba(255,255,255,0.04)\'" onmouseout="this.style.background=\'none\'">' +
              '<td style="padding:8px 12px;font-size:14px;font-weight:600;color:#e0e0e0;">' + s.name + retired + '</td>' +
              '<td style="padding:8px 12px;font-size:14px;color:#ccc;text-align:center;">' + s.year + '</td>' +
              '<td style="padding:8px 12px;text-align:center;"><span style="padding:3px 10px;border-radius:8px;background:' + catColor + ';color:#fff;font-size:12px;font-weight:700;">' + s.category + '</span></td>' +
              '<td style="padding:8px 12px;font-size:14px;color:#ccc;text-align:right;">' + (s.max_wind_mph || '—') + ' mph</td>' +
              '<td style="padding:8px 12px;font-size:14px;color:#ccc;text-align:right;">' + (s.min_pressure_mb || '—') + ' mb</td>' +
            '</tr>';
          });
          h += '</table>';
          container.innerHTML = h;

          // Click to play
          container.querySelectorAll('[data-sid]').forEach(function(row) {
            row.addEventListener('click', function() {
              var sid = row.getAttribute('data-sid');
              var s = storms.find(function(st) { return st.storm_id === sid; });
              if (s) {
                selectedStorm = { storm_id: s.storm_id, name: s.name, year: s.year, peak_category: s.category, peak_category_num: s.category_num };
                playBtn.disabled = false;
                playBtn.textContent = "Play " + s.name + " (" + s.year + ")";
                searchInput.value = s.name;
                document.getElementById("intelOverlay").classList.remove("open");
              }
            });
          });
        }
      }

      // Pre-populate featured storms
      loadFeaturedStorms();

    });
  </script>
</body>
</html>
